<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Carno2d</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">   
        <link rel="stylesheet" href="index.css">        

        <link rel="icon" href="./favicon.ico" type="image/x-icon">
		<link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
    </head>
<body>
<main class="container">
    <h1>
        <span id="title">Carno 2d</span>  
        <span id="info"> </span> 
        <span id="info2"></span>
    </h1>
    <!------------------ top panel ---------------->
    <section>
        <input id="sizeParams" type="text" value="W=600; H=550">

        <button id="clearButton" class="command">C</button>
        <button id="execButton" class="command">Exec</button>
        <button id="runButton" class="command" title="Play-Pause">Run</button>
        <button id="helpButton" class="command" onclick="window.open('help.html');">Help</button>
    </section>
    <section>
        <label>
            Vis <span id="visPercentage">10%</span>
            <input id="visRange" type="range" min="0", max="6" value="2" title="visibility percentage">
        </label>
        <label>          
            Pretty
            <input id="prettyBox" type="checkbox" > 
        </label>
        <label>
            Speed 
            <input id="speedRange" type="range" min="0", max="2" value="2" title="Speed of time">
        </label>
    </section>
        
    <section> 
        <textarea id="processArea" spellcheck="false" title="Вікно команд">
title ISOCHORIC test
plunger m=3000, t=126
scale   P=6, T=11, S=0.16, X=2.1, V=3
isohoric-   m=900
isohoric+   m=3000
         </textarea>
    </section>

    <!-- ------------------canvases------------------  -->
      <div class="canvas-frame">
        <canvas id="canvas"  tabindex="0"></canvas>
        <canvas id="canvas2"></canvas>
      </div>
      
    <!-- ------------------bottom panel------------------  -->
    <div class="bottom-panel">
        <button id="saveSceneButton" class="scene-btn" title="Export scene">⬇</button>
        <textarea id="savedSceneText" rows="1" class="scene-textarea">
        </textarea>
        <button id="loadSceneButton" class="scene-btn" title="Import scene">⬆</button>
    </div>


    <script type="module" src="main.js"></script>
</main>
</body>
</html>
