<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Carno2d</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">   
        <link rel="stylesheet" href="index.css">        

        <link rel="icon" href="./favicon.ico" type="image/x-icon">
		<link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
    </head>
<body>
<main class="container">
    <h1>
        Carno 2d  
        <span id="info"> </span> 
        <span id="info2"></span>
    </h1>
    <!------------------ top panel ---------------->
    <section>
        <input id="sizeParams" type="text" value="W=600; H=550">
    
        <button id="readyButton" class="command">Ready</button>
        <button id="runButton" class="command" title="Play-Pause">Run</button>
        <button id="helpButton" class="command" onclick="window.open('help.html');">Help</button>
    </section>
    <section>
        Vis <input id="visRange" type="range" min="0", max="6" value="2" title="visibility percentage">
        <span id="visPercentage">10%</span>
        <label>
            <input id="prettyBox" type="checkbox" style="margin-left: 50px;"> 
            Pretty
        </label>
       
    </section>
        <section> 
        <textarea id="processArea" spellcheck="false" title="Вікно команд">
title:         Цикл Отто (бензиновий)
load: otto_plunger
scale:         P=0.06, T=0.4, S=0.13, V=1.2, X=0.05
intake:                v=90000
compression: m=8500,   v=12000
ignition:    rate=1.5, t=2000
expansion:   m=16000,  v=88000
exhaust:     m=1000,   v=8000 

         </textarea>
    </section>

    <!-- ------------------canvases------------------  -->
      <div class="canvas-frame">
        <canvas id="canvas"  tabindex="0"></canvas>
        <canvas id="canvas2"></canvas>
      </div>
      
    <!-- ------------------bottom panel------------------  -->
    <div class="bottom-panel">
        <button id="saveSceneButton" class="scene-btn" title="Export scene">⬇</button>
        <textarea id="savedSceneText" rows="1" class="scene-textarea">
        </textarea>
        <button id="loadSceneButton" class="scene-btn" title="Import scene">⬆</button>
    </div>

<!-- =========================================================================== -->
    <textarea id="repoArea" spellcheck="false"  rows="30" >
com_plunger: '{"bombs":[{"n":10000,"x1":40,"y1":340,"x2":240,"y2":480,"vx":0,"vy":0,"t":126,"r":0.5,"m":0.4,"c":"red"}],"lines":[{"x1":40,"y1":480,"x2":240,"y2":480,"c":"blue"},{"x1":40,"y1":20,"x2":40,"y2":480,"c":"blue"},{"x1":40,"y1":20,"x2":240,"y2":20,"c":"blue"},{"x1":240,"y1":20,"x2":240,"y2":480,"c":"blue"}],"plungers":[{"x1":40,"y1":20,"x2":240,"y2":480,"v":28000,"m":3000}],"devices":[],"glo":{"g":0.1,"gBall":0,"cell":20,"viz":10,"quant":5,"metr":1}}',

        
otto_plunger: '{"bombs":[],"lines":[{"x1":40,"y1":480,"x2":240,"y2":480,"c":"blue"},{"x1":40,"y1":20,"x2":40,"y2":480,"c":"blue"},{"x1":40,"y1":20,"x2":240,"y2":20,"c":"blue"},{"x1":240,"y1":20,"x2":240,"y2":480,"c":"blue"}],"plungers":[{"x1":40,"y1":20,"x2":240,"y2":480,"v":8000,"m":100}],"devices":[],"glo":{"g":0.1,"gBall":0,"cell":20,"viz":10,"quant":5,"metr":1}}',

===============================================
load: Norm
run: 
    </textarea>  
    <script type="module" src="main.js"></script>
</main>
</body>
</html>
