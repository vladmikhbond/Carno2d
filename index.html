<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Carno2d</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">   
        <link rel="stylesheet" href="index.css">        

        <link rel="icon" href="./favicon.ico" type="image/x-icon">
		<link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
    </head>
<body>
<main class="container">
    <h1>
        Carno 2d  
        <span id="info"> </span> 
        <span id="info2"></span>
    </h1>
    <!------------------ top panel ---------------->
    <section>
        <input id="sizeParams" type="text" value="W=600; H=550">
    
        <button id="readyButton" class="command">Ready</button>
        <button id="runButton" class="command" title="Play-Pause">Run</button>
        <button id="helpButton" class="command" onclick="window.open('help.html');">Help</button>
    </section>
    <section>
        Vis <input id="visRange" type="range" min="0", max="6" value="2" title="visibility percentage">
        <span id="visPercentage">10%</span>
    </section>
        <section> 
        <textarea id="processArea" spellcheck="false" title="Вікно команд">
title: isobaric test              
plunger: m=3000, T=100
scale:   P=4.5, T=9.2, S=0.2, X=1.3, V=2.5 
+isobaric:   v=50000 
-isobaric:   v=22800              
        </textarea>
    </section>

    <!-- ------------------canvases------------------  -->
      <div class="canvas-frame">
        <canvas id="canvas"  tabindex="0"></canvas>
        <canvas id="canvas2"></canvas>
      </div>
      
    <!-- ------------------bottom panel------------------  -->
    <div class="bottom-panel">
        <button id="saveSceneButton" class="scene-btn" title="Export scene">⬇</button>
        <textarea id="savedSceneText" rows="1" class="scene-textarea">
        </textarea>
        <button id="loadSceneButton" class="scene-btn" title="Import scene">⬆</button>
    </div>
